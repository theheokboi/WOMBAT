layers_version: 1
layers:
  - name: metro_density_core
    plugin: inframap.layers.metro_density_core:MetroDensityCoreLayer
    version: m1
    params:
      resolution: 7
      min_facilities: 2
      core_radius: 2
      enforce_contiguity: true
  - name: country_mask
    plugin: inframap.layers.country_mask:CountryMaskLayer
    version: v1
    params:
      mode: fixed_resolution
      membership_rule: overlap_ratio
      resolution: 2
      polygon_dataset_dir: data/countries
      include_iso_a2: ["AR", "GB", "JP", "TW", "ZA"]
      exclude_iso_a2: []
  - name: facility_density_adaptive
    plugin: inframap.layers.facility_density_adaptive:FacilityDensityAdaptiveLayer
    version: v3
    params:
      base_resolution: 3
      empty_compact_min_resolution: 0
      facility_floor_resolution: 7
      facility_max_resolution: 7
      target_facilities_per_leaf: 1
      empty_interior_max_resolution: 2
      min_output_resolution: 2
      empty_refine_boundary_band_k: 1
      empty_refine_near_occupied_k: 1
      compact_empty_near_occupied: false
      max_neighbor_resolution_delta: 1
  - name: facility_density_r7_regions
    plugin: inframap.layers.facility_density_r7_regions:FacilityDensityR7RegionsLayer
    version: v1
    params:
      source_layer: facility_density_adaptive
      target_resolution: 7
