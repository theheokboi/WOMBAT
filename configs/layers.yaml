layers_version: 1
layers:
  - name: metro_density_core
    plugin: inframap.layers.metro_density_core:MetroDensityCoreLayer
    version: m1
    params:
      resolution: 7
      min_facilities: 2
      core_radius: 2
      enforce_contiguity: true
  - name: country_mask
    plugin: inframap.layers.country_mask:CountryMaskLayer
    version: v1
    params:
      resolution: 4
      membership_rule: centroid_in_polygon
      polygon_dataset: data/reference/natural_earth_admin0_subset.geojson
      exclude_iso_a2: ["AQ"]
  - name: facility_density_adaptive
    plugin: inframap.layers.facility_density_adaptive:FacilityDensityAdaptiveLayer
    version: v1
    params:
      min_resolution: 1
      max_resolution: 10
      split_threshold: 25
