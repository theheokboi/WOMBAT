<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infrastructure Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/ui/styles.css" />
  </head>
  <body>
    <div id="panel">
      <h1>Infrastructure Layers</h1>
      <div class="controls">
        <label><input type="checkbox" id="toggle-facilities" checked /> Facilities</label>
        <label><input type="checkbox" id="toggle-country" checked /> Country H3</label>
        <label><input type="checkbox" id="toggle-adaptive" checked /> Adaptive Facility H3</label>
        <label>
          Facility style
          <select id="facility-style">
            <option value="beeswarm" selected>Beeswarm</option>
            <option value="raw">Raw</option>
            <option value="aggregated">Aggregated (size by count)</option>
          </select>
        </label>
      </div>
      <div id="legend">
        <div><span class="swatch facility"></span> Facility points</div>
        <div><span class="swatch country"></span> Country cells</div>
        <div><span class="swatch adaptive"></span> Adaptive facility cells</div>
      </div>
      <div id="stats">
        <div id="facility-count">Facilities loaded: --</div>
        <div id="location-count">Unique locations: --</div>
      </div>
      <div id="drilldown">
        <h2>Cell Drill-down</h2>
        <div id="drilldown-content">Click an H3 cell to list facilities.</div>
      </div>
    </div>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/h3-js@4.1.0/dist/h3-js.umd.js"></script>
    <script src="/ui/main.js"></script>
  </body>
</html>
